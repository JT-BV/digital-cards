
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>James Heffernan – Modularity</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:      #1f3a6e;
      --navy-deep: #152848;
      --orange:    #e8622a;
      --white:     #ffffff;
      --offwhite:  #f5f7fb;
      --mid:       #8fa3c0;
      --line:      #eaeef5;
    }
    body {
      min-height: 100vh;
      background: #dce3ef;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow', sans-serif;
      padding: 24px;
    }
    .card {
      width: 400px; max-width: 100%;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 28px 60px rgba(21,40,72,0.22), 0 4px 16px rgba(21,40,72,0.10);
      animation: rise 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes rise {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    .top {
      background: #fff; padding: 24px 28px 0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .top img.logo { height: 44px; width: auto; display: block; flex-shrink: 0; }
    .name-block { text-align: right; padding-top: 4px; }
    .name-block .name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.45rem; font-weight: 700;
      color: var(--navy-deep); line-height: 1.1;
    }
    .name-block .role {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--orange); margin-top: 3px;
    }
    .bar-wrap { background: #fff; padding: 14px 28px 0; }
    .bar { height: 3px; background: var(--orange); border-radius: 2px; }
    .slogan {
      background: var(--navy-deep); padding: 9px 28px;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    .contacts { background: #fff; padding: 8px 20px 12px; }
    .row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 8px; border-radius: 10px;
      text-decoration: none; color: inherit;
      transition: background 0.15s;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: var(--offwhite); }
    .icon {
      flex-shrink: 0; width: 32px; height: 32px;
      background: #edf1f8; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 15px; height: 15px; fill: var(--navy); }
    .detail { flex: 1; }
    .label {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 1px;
    }
    .value { font-size: 0.875rem; font-weight: 500; color: var(--navy-deep); line-height: 1.35; }
    .qr-band {
      background: var(--offwhite); border-top: 1px solid #dde3ee;
      padding: 18px 24px; display: flex; align-items: center; gap: 16px;
    }
    .qr-box {
      flex-shrink: 0; background: white;
      border-radius: 10px; padding: 7px;
      box-shadow: 0 2px 8px rgba(21,40,72,0.10);
      line-height: 0;
    }
    .qr-box canvas, .qr-box img {
      display: block; border-radius: 4px;
      width: 90px !important; height: 90px !important;
    }
    .qr-text { flex: 1; }
    .qr-title {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--mid); margin-bottom: 4px;
    }
    .qr-desc { font-size: 0.8rem; color: var(--navy); font-weight: 500; line-height: 1.45; }
    .save-btn {
      display: block; width: 100%;
      background: var(--orange); color: white; border: none;
      padding: 15px; font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; font-family: 'Barlow', sans-serif;
      transition: background 0.18s;
    }
    .save-btn:hover { background: #d4541f; }
  </style>
</head>
